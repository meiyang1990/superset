configOverrides:
  secret: |
    import pymysql
    import os
    pymysql.install_as_MySQLdb()

    # Monkey-patch: fix sqlalchemy-doris 0.2.x has_table AttributeError: __enter__
    try:
        from sqlalchemy import text
        from sqlalchemy_doris.dialect import DorisDialect
        def _patched_has_table(self, connection, table_name, schema=None, **kw):
            result = connection.execute(
                text(
                    "SELECT COUNT(*) FROM information_schema.tables "
                    "WHERE TABLE_SCHEMA = :schema AND TABLE_NAME = :table_name"
                ),
                {"schema": schema or self.default_schema_name, "table_name": table_name},
            )
            return result.scalar() > 0
        DorisDialect.has_table = _patched_has_table
    except Exception:
        pass

    SECRET_KEY = "R3ZK8ZmgqjuQRg/9kDAWM/+OumKK36cwqT04k/LZZZtMJRalp"
    SQLALCHEMY_DATABASE_URI = f"mysql+pymysql://{os.getenv('DB_USER')}:{os.getenv('DB_PASS')}@{os.getenv('DB_HOST')}:{os.getenv('DB_PORT')}/{os.getenv('DB_NAME')}"
    from flask_caching.backends.filesystemcache import FileSystemCache
    CACHE_CONFIG = {'CACHE_TYPE': 'FileSystemCache', 'CACHE_DIR': '/tmp/superset_cache', 'CACHE_DEFAULT_TIMEOUT': 3600}
    DATA_CACHE_CONFIG = {'CACHE_TYPE': 'FileSystemCache', 'CACHE_DIR': '/tmp/superset_data_cache', 'CACHE_DEFAULT_TIMEOUT': 3600}
    RESULTS_BACKEND = FileSystemCache('/tmp/superset_results')
    class CeleryConfig:
        imports = ("superset.sql_lab",)
        broker_url = "filesystem://"
        result_backend = "filesystem://"
        filesystem_folder = "/tmp/celery"
    CELERY_CONFIG = CeleryConfig
    BABEL_DEFAULT_LOCALE = "zh"
    LANGUAGES = {"zh": {"flag": "cn", "name": "简体中文"}, "en": {"flag": "us", "name": "English"}}

