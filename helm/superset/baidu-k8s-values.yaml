bootstrapScript: |
  #!/bin/bash
  if [ ! -f ~/bootstrap ]; then echo "Running Superset with uid {{ .Values.runAsUser }}" > ~/bootstrap; fi
  sed -i 's|deb.debian.org|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list.d/debian.sources 2>/dev/null || sed -i 's|deb.debian.org|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list
  apt-get update && apt-get install -y --no-install-recommends pkg-config default-libmysqlclient-dev build-essential
  uv pip install --index-url https://pypi.tuna.tsinghua.edu.cn/simple \
    pymysql \
    cryptography \
    pydoris \
    sqlalchemy-doris

